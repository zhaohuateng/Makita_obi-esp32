; PlatformIO Project Configuration File
; 适配标准 ESP32 (ESP32-D0WD-V3) 的完整配置
; 基于原项目修改，仅改动芯片类型和移除 USB CDC 标志

[platformio]
platform_packages =
    platformio/toolchain-xtensa-esp32 @ ~8.4.0

[common]
build_flags_common = -Os -std=gnu++17 -DCORE_DEBUG_LEVEL=0
lib_deps_common =
    paulstoffregen/OneWire @ ^2.3.7
    bblanchon/ArduinoJson @ ^6.21.3
    me-no-dev/AsyncTCP @ ^1.1.1
    me-no-dev/ESPAsyncWebServer @ ^1.2.9

; 主环境：Web 界面固件
[env:esp32_web]
platform = espressif32
board = esp32dev                ; 改动1：从 esp32-c3-devkitm-1 改为 esp32dev
framework = arduino

board_build.flash_mode = dio
board_build.f_cpu = 240000000L

build_flags = 
    ${common.build_flags_common}
    ; 改动2：删除以下两行（ESP32-C3 专用）
    ; -DARDUINO_USB_MODE=1
    ; -DARDUINO_USB_CDC_ON_BOOT=1
    -DONEWIRE_PIN=3
    -DENABLE_PIN=4

monitor_speed = 115200
upload_speed = 921600
erase_before_upload = no

lib_deps = 
    ${common.lib_deps_common}

; OTA 环境（可选）
[env:esp32_ota]
platform = espressif32
board = esp32dev
framework = arduino

board_build.flash_mode = dio
board_build.f_cpu = 240000000L

build_flags = 
    ${common.build_flags_common}
    -DOTA_ENABLE
    -DONEWIRE_PIN=3
    -DENABLE_PIN=4

monitor_speed = 115200
upload_speed = 921600
erase_before_upload = no

lib_deps = 
    ${common.lib_deps_common}
    ayushsharma82/AsyncElegantOTA @ ^2.2.5
