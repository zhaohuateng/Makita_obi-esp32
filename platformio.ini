; PlatformIO Project Configuration File
; 针对标准 ESP32 (ESP32-D0WD-V3) 的优化版

[common]
build_flags_common = -Os -std=gnu++17 -DCORE_DEBUG_LEVEL=1
lib_deps_common =
    paulstoffregen/OneWire @ ^2.3.8
    bblanchon/ArduinoJson @ ^7.0.4
    ; 将 ESPAsyncWebServer 库更新为已知稳定且兼容的版本组合
    me-no-dev/AsyncTCP @ ^1.1.1
    me-no-dev/ESPAsyncWebServer @ ^3.0.0

[env:esp32_web]
platform = espressif32
board = esp32dev
framework = arduino
board_build.flash_mode = dio
board_build.f_cpu = 240000000L

build_flags = 
    ${common.build_flags_common}
    -DONEWIRE_PIN=3
    -DENABLE_PIN=4
    ; 显式声明 Flash 大小和分区方案，避免自动检测错误
    -DCONFIG_ESPTOOLPY_FLASHSIZE_4MB
    -DARDUINO_PARTITION_default.csv

monitor_speed = 115200
upload_speed = 921600
lib_deps = ${common.lib_deps_common}

[env:esp32_ota]
extends = env:esp32_web
upload_protocol = espota
lib_deps = ${common.lib_deps_common}
    ayushsharma82/AsyncElegantOTA @ ^2.2.5
